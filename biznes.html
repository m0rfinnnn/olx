<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLX Circle Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #222222);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f2);
            --olx-teal: #002f34;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* ПОШУК */
        .header-search {
            padding: 15px;
            background: var(--tg-bg);
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-box {
            background: var(--tg-sec-bg);
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            flex-grow: 1;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            margin-left: 10px;
            width: 100%;
            color: var(--tg-text);
        }

        /* КОНТЕНТ */
        .container { padding: 15px; padding-bottom: 100px; }
        .tab { display: none; }
        .tab.active { display: block; }

        /* КАРТКИ */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card {
            background: var(--tg-sec-bg);
            border-radius: 15px;
            overflow: hidden;
        }
        .item-card img { width: 100%; height: 120px; object-fit: cover; }
        .item-info { padding: 10px; }
        .item-price { font-weight: 900; color: var(--olx-teal); margin-top: 5px; }

        /* НИЖНЄ МЕНЮ З КРУГЛИМИ КНОПКАМИ */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
            pointer-events: none; /* Щоб не заважати клікам поза кнопками */
        }

        .nav-btn {
            width: 55px;
            height: 55px;
            background: var(--tg-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            color: var(--tg-hint);
            cursor: pointer;
            pointer-events: auto;
            transition: 0.3s;
            border: 1px solid var(--tg-sec-bg);
        }

        .nav-btn.active {
            background: var(--olx-teal);
            color: white;
            transform: translateY(-5px);
        }

        .nav-btn i { font-size: 20px; }

        /* Спеціальна кнопка Плюс */
        .btn-main {
            width: 65px;
            height: 65px;
            background: var(--olx-teal);
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header-search">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Пошук на OLX...">
        </div>
    </div>

    <div class="container">
        <div id="home" class="tab active">
            <div class="item-grid">
                <div class="item-card">
                    <img src="https://picsum.photos/200/200?v=1">
                    <div class="item-info">
                        <div style="font-size: 14px;">Квадрокоптер</div>
                        <div class="item-price">15 000 ₴</div>
                    </div>
                </div>
                <div class="item-card">
                    <img src="https://picsum.photos/200/200?v=2">
                    <div class="item-info">
                        <div style="font-size: 14px;">Монітор 24"</div>
                        <div class="item-price">4 200 ₴</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="sell" class="tab">
            <h2 style="text-align: center;">Нове оголошення</h2>
            <div style="background: var(--tg-sec-bg); padding: 20px; border-radius: 15px;">
                <p>Додайте фото та опис вашого товару</p>
                <div style="width: 100%; height: 100px; border: 2px dashed var(--tg-hint); border-radius: 10px; display: flex; justify-content: center; align-items: center;">
                    <i class="fa fa-camera" style="font-size: 30px; color: var(--tg-hint);"></i>
                </div>
            </div>
        </div>

        <div id="profile" class="tab">
            <div style="text-align: center; margin-top: 20px;">
                <div style="width: 80px; height: 80px; background: var(--olx-teal); border-radius: 50%; margin: 0 auto; display: flex; justify-content: center; align-items: center; color: white; font-size: 30px;">
                    <i class="fa fa-user"></i>
                </div>
                <h3 id="u-name">Завантаження...</h3>
                <button onclick="tg.close()" style="background: none; border: 1px solid red; color: red; padding: 10px 20px; border-radius: 20px;">Вийти</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="switchTab('home', this)">
            <i class="fa-solid fa-house"></i>
        </div>
        <div class="nav-btn btn-main" onclick="switchTab('sell', this)">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="nav-btn" onclick="switchTab('profile', this)">
            <i class="fa-solid fa-user"></i>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Відображення імені
        if (tg.initDataUnsafe?.user) {
            document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Логіка перемикання вкладок
        function switchTab(tabId, el) {
            tg.HapticFeedback.impactOccurred('light');

            // Керування кнопкою Назад
            if (tabId === 'home') {
                tg.BackButton.hide();
            } else {
                tg.BackButton.show();
            }

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // Обробка натискання кнопки Назад у Telegram
        tg.BackButton.onClick(() => {
            switchTab('home', document.querySelectorAll('.nav-btn')[0]);
        });
    </script>
</body>
</html>
