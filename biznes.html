<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLX Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #222222);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f2);
            --olx-teal: #002f34;
        }

        body { font-family: 'Roboto', sans-serif; background: var(--tg-bg); color: var(--tg-text); margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* Header & Search */
        .header { position: sticky; top: 0; background: var(--tg-bg); z-index: 100; padding: 10px; border-bottom: 1px solid var(--tg-sec-bg); }
        .search-bar { background: var(--tg-sec-bg); border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; }
        .search-bar input { background: transparent; border: none; outline: none; width: 100%; margin-left: 10px; color: var(--tg-text); font-size: 16px; }

        /* Categories */
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 12px 10px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--tg-sec-bg); padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; border: 1px solid transparent; transition: 0.2s; }
        .cat-btn.active { background: var(--olx-teal); color: white; }

        /* Tabs */
        .tab-content { display: none; padding: 10px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--tg-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--tg-sec-bg); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-price { font-weight: bold; font-size: 16px; color: var(--olx-teal); margin-top: 5px; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 1000; pointer-events: none; }
        .nav-item { width: 55px; height: 55px; background: var(--tg-bg); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); color: var(--tg-hint); border: 1px solid var(--tg-sec-bg); pointer-events: auto; cursor: pointer; }
        .nav-item.active { background: var(--olx-teal); color: white; transform: translateY(-5px); }
        .nav-item.main { width: 65px; height: 65px; background: var(--olx-teal); color: white; font-size: 24px; }

        /* Inputs */
        .olx-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--tg-sec-bg); background: var(--tg-sec-bg); color: var(--tg-text); box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header" id="mainHeader">
        <div class="search-bar">
            <i class="fa fa-search" style="color: var(--tg-hint);"></i>
            <input type="text" id="searchInput" placeholder="Пошук оголошень...">
        </div>
        <div class="categories">
            <div class="cat-btn active" onclick="filterByCat('Всі', this)">Всі</div>
            <div class="cat-btn" onclick="filterByCat('Електроніка', this)">Електроніка</div>
            <div class="cat-btn" onclick="filterByCat('Авто', this)">Авто</div>
            <div class="cat-btn" onclick="filterByCat('Дім', this)">Дім</div>
        </div>
    </div>

    <div class="container">
        <div id="home" class="tab-content active">
            <div class="grid" id="productGrid"></div>
        </div>

        <div id="sell" class="tab-content">
            <h2 style="text-align:center">Подати оголошення</h2>
            <input type="text" placeholder="Назва товару" class="olx-input">
            <input type="number" placeholder="Ціна (грн)" class="olx-input">
            <textarea placeholder="Опис" class="olx-input" rows="4"></textarea>
            <button onclick="tg.showAlert('Оголошення надіслано!')" style="width:100%; padding:15px; background:var(--olx-teal); color:white; border:none; border-radius:10px; font-weight:bold">Опублікувати</button>
        </div>

        <div id="profile" class="tab-content" style="text-align:center">
            <div style="width:100px; height:100px; background:var(--olx-teal); border-radius:50%; margin: 40px auto 10px; display:flex; align-items:center; justify-content:center; color:white; font-size:40px">
                <i class="fa fa-user"></i>
            </div>
            <h3 id="userName">Користувач</h3>
            <p style="color:var(--tg-hint)">У вас поки немає активних оголошень</p>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fa fa-house"></i></div>
        <div class="nav-item main" onclick="switchTab('sell', this)"><i class="fa fa-plus"></i></div>
        <div class="nav-item" onclick="switchTab('profile', this)"><i class="fa fa-user"></i></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const db = [
            { t: "iPhone 15 Pro", p: "42 500 ₴", c: "Електроніка", i: "https://picsum.photos/200/200?1" },
            { t: "BMW M5 F90", p: "2 100 000 ₴", c: "Авто", i: "https://picsum.photos/200/200?2" },
            { t: "Крісло ігрове", p: "5 400 ₴", c: "Дім", i: "https://picsum.photos/200/200?3" },
            { t: "MacBook Air", p: "35 000 ₴", c: "Електроніка", i: "https://picsum.photos/200/200?4" }
        ];

        function render(items) {
            const g = document.getElementById('productGrid');
            g.innerHTML = items.map(x => `
                <div class="card" onclick="tg.showConfirm('Бажаєте зв\'язатися з продавцем?')">
                    <img src="${x.i}">
                    <div class="card-info">
                        <div style="font-size:14px; height:34px; overflow:hidden">${x.t}</div>
                        <div class="card-price">${x.p}</div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(id, el) {
            tg.HapticFeedback.impactOccurred('medium');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            
            // Ховаємо пошук якщо не на головній
            document.getElementById('mainHeader').style.display = (id === 'home' ? 'block' : 'none');
            // Кнопка Назад
            if(id === 'home') tg.BackButton.hide(); else tg.BackButton.show();
        }

        function filterByCat(cat, el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render(cat === 'Всі' ? db : db.filter(x => x.c === cat));
        }

        document.getElementById('searchInput').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(db.filter(x => x.t.toLowerCase().includes(v)));
        };

        tg.BackButton.onClick(() => switchTab('home', document.querySelectorAll('.nav-item')[0]));
        if(tg.initDataUnsafe?.user) document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
        
        render(db);
    </script>
</body>
</html>
