<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLX Smart Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --olx-green: #407c3c;
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #222222);
            --tg-sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f2);
        }

        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; color: var(--tg-text); margin: 0; padding-bottom: 110px; }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Шапка та Пошук */
        .header { background: white; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .header-top { display: flex; align-items: center; gap: 10px; position: relative; }
        .search-container { flex-grow: 1; display: flex; align-items: center; background: var(--tg-sec-bg); border-radius: 10px; padding: 8px 12px; }
        .search-container input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; margin-left: 8px; }

        /* Випадаючий список пошуку як в Google */
        .search-hints { 
            position: absolute; top: 45px; left: 0; right: 40px; background: white; 
            border-radius: 0 0 10px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            z-index: 2000; display: none; border: 1px solid #eee;
        }
        .hint-item { padding: 12px 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; }
        .hint-item:last-child { border: none; }

        /* Фільтри */
        .filter-row { display: flex; gap: 10px; overflow-x: auto; padding: 12px 0 5px 0; scrollbar-width: none; }
        .filter-chip { padding: 8px 18px; border-radius: 20px; border: 1.5px solid #ddd; font-size: 13px; white-space: nowrap; cursor: pointer; color: #666; font-weight: 600; }
        .filter-chip.active { background: var(--olx-green); color: white; border-color: var(--olx-green); }

        /* Картки товарів */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 125px; object-fit: cover; background: #f0f0f0; }
        .product-info { padding: 10px; }
        .p-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: #222; }
        .p-price { color: var(--olx-green); font-weight: 800; font-size: 16px; margin-bottom: 6px; }
        .p-desc { font-size: 12px; color: #777; line-height: 1.3; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Форма */
        .add-form { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .btn-publish { width: 100%; background: var(--olx-green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 10px; }

        /* Навігація */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: var(--olx-green); font-size: 11px; font-weight: 700; flex: 1; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 3px; }
        .plus-btn { width: 60px; height: 60px; background: var(--olx-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; margin-top: -40px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .empty { text-align: center; padding: 60px 20px; color: #ccc; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header">
            <div class="header-top">
                <div class="search-container">
                    <i class="fa fa-search" style="color: var(--olx-green)"></i>
                    <input type="text" id="searchInput" placeholder="Пошук оголошень..." autocomplete="off">
                </div>
                <button class="settings-btn" style="background:none; border:none; color:var(--olx-green); font-size:20px;"><i class="fa fa-cog"></i></button>
                <div id="searchHints" class="search-hints"></div>
            </div>
            <div class="filter-row">
                <div class="filter-chip active" onclick="filterCat('Всі', this)">Всі</div>
                <div class="filter-chip" onclick="filterCat('Нерухомість', this)">Нерухомість</div>
                <div class="filter-chip" onclick="filterCat('Авто', this)">Авто</div>
                <div class="filter-chip" onclick="filterCat('Електроніка', this)">Електроніка</div>
            </div>
        </div>
        <div id="productGrid" class="products-grid"></div>
        <div id="emptyState" class="empty">
            <i class="fa-regular fa-face-frown" style="font-size: 50px;"></i>
            <p>ТОВАРІВ ПОКИ ЩО НЕМАЄ</p>
        </div>
    </div>

    <div id="add-page" class="page">
        <div class="add-form">
            <h2 style="margin-bottom:20px;">Нове оголошення</h2>
            <div class="input-group">
                <label>Фото</label>
                <input type="file" id="itemPhoto" accept="image/*">
            </div>
            <div class="input-group">
                <label>Назва</label>
                <input type="text" id="itemName" placeholder="Що ви продаєте?">
            </div>
            <div class="input-group">
                <label>Ціна (грн)</label>
                <input type="number" id="itemPrice" placeholder="0">
            </div>
            <div class="input-group">
                <label>Категорія</label>
                <select id="itemCat">
                    <option>Нерухомість</option>
                    <option>Авто</option>
                    <option>Електроніка</option>
                </select>
            </div>
            <div class="input-group">
                <label>Опис товару</label>
                <textarea id="itemDesc" rows="3" placeholder="Опишіть ваш товар детально..."></textarea>
            </div>
            <button class="btn-publish" onclick="publishItem()">Опублікувати</button>
        </div>
    </div>

    <div id="profile-page" class="page" style="text-align:center; padding: 50px 20px;">
        <i class="fa fa-user-circle" style="font-size: 80px; color: var(--olx-green)"></i>
        <h2 id="uName">Користувач</h2>
        <p style="color:#888;">Ваш профіль та налаштування</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-h" onclick="showTab('home-page', this)"><i class="fa fa-home"></i>Головна</div>
        <div class="plus-btn" onclick="showTab('add-page', this)"><i class="fa fa-plus"></i></div>
        <div class="nav-item" id="nav-p" onclick="showTab('profile-page', this)"><i class="fa fa-user"></i>Профіль</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // ЗАВАНТАЖЕННЯ З ПАМ'ЯТІ (LocalStorage)
        let allProducts = JSON.parse(localStorage.getItem('olx_products')) || [];
        let currentFilter = 'Всі';

        function saveToStorage() {
            localStorage.setItem('olx_products', JSON.stringify(allProducts));
        }

        function showTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el && el.classList.contains('nav-item')) el.classList.add('active');
            if(id !== 'home-page') tg.BackButton.show(); else tg.BackButton.hide();
        }

        tg.BackButton.onClick(() => showTab('home-page', document.getElementById('nav-h')));

        function publishItem() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const desc = document.getElementById('itemDesc').value;
            const cat = document.getElementById('itemCat').value;
            const photoInput = document.getElementById('itemPhoto');

            if(!name || !price || !desc) {
                tg.showAlert("Заповніть всі поля!");
                return;
            }

            const file = photoInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const newItem = {
                    id: Date.now(),
                    title: name,
                    price: price + " грн",
                    desc: desc,
                    category: cat,
                    img: e.target.result
                };

                allProducts.unshift(newItem);
                saveToStorage(); // ЗБЕРІГАЄМО У ПАМ'ЯТЬ
                
                tg.HapticFeedback.notificationOccurred('success');
                
                // Очищення
                document.getElementById('itemName').value = "";
                document.getElementById('itemPrice').value = "";
                document.getElementById('itemDesc').value = "";
                photoInput.value = "";

                showTab('home-page', document.getElementById('nav-h'));
                render();
            };

            if(file) reader.readAsDataURL(file);
            else reader.onload({target: {result: 'https://via.placeholder.com/300x200?text=No+Photo'}});
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const empty = document.getElementById('emptyState');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allProducts;
            if(currentFilter !== 'Всі') filtered = filtered.filter(p => p.category === currentFilter);
            if(searchVal) filtered = filtered.filter(p => p.title.toLowerCase().includes(searchVal));

            if(filtered.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                empty.style.display = 'none';
                grid.innerHTML = filtered.map(p => `
                    <div class="product-card">
                        <img src="${p.img}">
                        <div class="product-info">
                            <div class="p-title">${p.title}</div>
                            <div class="p-price">${p.price}</div>
                            <div class="p-desc">${p.desc}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Логіка Google-підказок
        document.getElementById('searchInput').oninput = function() {
            const val = this.value.toLowerCase();
            const hints = document.getElementById('searchHints');
            
            if(val.length > 0) {
                const matches = allProducts.filter(p => p.title.toLowerCase().includes(val)).slice(0, 5);
                if(matches.length > 0) {
                    hints.innerHTML = matches.map(m => `<div class="hint-item" onclick="applyHint('${m.title}')"><i class="fa fa-search" style="margin-right:10px; color:#ccc;"></i>${m.title}</div>`).join('');
                    hints.style.display = 'block';
                } else { hints.style.display = 'none'; }
            } else { hints.style.display = 'none'; }
            render();
        };

        function applyHint(text) {
            document.getElementById('searchInput').value = text;
            document.getElementById('searchHints').style.display = 'none';
            render();
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentFilter = cat;
            render();
        }

        if(tg.initDataUnsafe?.user) document.getElementById('uName').innerText = tg.initDataUnsafe.user.first_name;
        render();
    </script>
</body>
</html>
