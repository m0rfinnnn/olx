<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Спільна Малювалка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="drawingCanvas"></canvas>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Підключаємося до WebSocket сервера
        // Якщо сервер працює по https, використовуємо wss://, якщо локально - ws://
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
        const ws = new WebSocket(wsUrl);

        // Малюємо лінію на екрані
        const drawLine = (x0, y0, x1, y1, isRemote = false) => {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = isRemote ? 'red' : 'black'; // Чужі лінії червоні, твої чорні
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.closePath();
        };

        // Коли малюєш ти
        const startDraw = (e) => {
            isDrawing = true;
            lastX = e.clientX || e.touches[0].clientX;
            lastY = e.clientY || e.touches[0].clientY;
        };

        const stopDraw = () => isDrawing = false;

        const drawing = (e) => {
            if (!isDrawing) return;
            let currentX = e.clientX || e.touches[0].clientX;
            let currentY = e.clientY || e.touches[0].clientY;

            drawLine(lastX, lastY, currentX, currentY, false);

            // Відправляємо координати на сервер
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    x0: lastX, y0: lastY, x1: currentX, y1: currentY
                }));
            }

            lastX = currentX;
            lastY = currentY;
        };

        // Коли приходять координати від інших
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            drawLine(data.x0, data.y0, data.x1, data.y1, true);
        };

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mousemove', drawing);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('touchmove', drawing);
    </script>
</body>
</html>
