<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLX Premium App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --olx-green: #407c3c;
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #222222);
            --tg-sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f2);
        }

        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; color: var(--tg-text); margin: 0; padding-bottom: 110px; overflow-x: hidden; }

        /* Вкладки */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Пошук та Фільтри (Головна) */
        .header { background: white; padding: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .search-container { display: flex; align-items: center; background: var(--tg-sec-bg); border-radius: 10px; padding: 10px; position: relative; }
        .search-container input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; margin-left: 10px; }
        
        .search-hints { position: absolute; top: 50px; left: 0; right: 0; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 100; display: none; border: 1px solid #eee; }
        .hint-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }

        .filter-row { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-chip { padding: 8px 18px; border-radius: 20px; border: 1.5px solid #ddd; font-size: 13px; white-space: nowrap; font-weight: 600; color: #666; }
        .filter-chip.active { background: var(--olx-green); color: white; border-color: var(--olx-green); }

        /* Профіль (Дизайн як на фото) */
        .profile-header { text-align: center; padding: 25px; background: white; border-bottom: 1px solid #eee; }
        .avatar-wrap { width: 100px; height: 100px; margin: 0 auto 15px; position: relative; }
        #avatarPreview { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--olx-green); object-fit: cover; }
        
        .btn-edit-profile { background: var(--olx-green); color: white; border: none; padding: 10px 25px; border-radius: 25px; font-weight: 600; font-size: 14px; margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: white; margin: 15px 0; }
        .stat-box { text-align: center; padding: 15px; border-right: 1px solid #eee; }
        .stat-box:last-child { border-right: none; }
        .stat-val { display: block; font-weight: 800; font-size: 18px; color: var(--olx-green); }
        .stat-label { font-size: 12px; color: #888; }

        .settings-list { background: white; margin: 15px 0; border-top: 1px solid #eee; }
        .settings-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .settings-item i:first-child { color: var(--olx-green); font-size: 20px; width: 35px; }
        .settings-item span { flex-grow: 1; font-weight: 500; }
        .settings-item i.fa-chevron-right { color: #ccc; font-size: 14px; }

        /* Сітка товарів */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 120px; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: block; }
        .p-price { color: var(--olx-green); font-weight: 800; font-size: 16px; display: block; margin-bottom: 6px; }
        .p-desc { font-size: 12px; color: #777; line-height: 1.2; height: 28px; overflow: hidden; }

        /* Порожній стан */
        .empty-box { text-align: center; padding: 40px 20px; color: #bbb; }
        .empty-box i { font-size: 50px; margin-bottom: 10px; display: block; }

        /* Навігація */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { text-align: center; color: var(--olx-green); font-size: 12px; font-weight: 700; opacity: 0.4; flex: 1; text-decoration: none; }
        .nav-link.active { opacity: 1; }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 4px; }
        
        .main-plus-btn { width: 65px; height: 65px; background: var(--olx-green); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Форма додавання */
        .form-page { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .btn-send { width: 100%; background: var(--olx-green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header">
            <div class="search-container">
                <i class="fa fa-search" style="color: var(--olx-green)"></i>
                <input type="text" id="searchInput" placeholder="Пошук товарів..." autocomplete="off">
                <div id="searchHints" class="search-hints"></div>
            </div>
            <div class="filter-row">
                <div class="filter-chip active" onclick="setFilter('Всі', this)">Всі</div>
                <div class="filter-chip" onclick="setFilter('Електроніка', this)">Електроніка</div>
                <div class="filter-chip" onclick="setFilter('Авто', this)">Авто</div>
                <div class="filter-chip" onclick="setFilter('Мода', this)">Мода</div>
            </div>
        </div>
        <div id="mainGrid" class="products-grid"></div>
        <div id="mainEmpty" class="empty-box" style="display:none;">
            <i class="fa-regular fa-face-frown"></i>
            <span>ТОВАРІВ ПОКИ ЩО НЕМАЄ</span>
        </div>
    </div>

    <div id="add-page" class="page form-page">
        <h2>Виставити товар</h2>
        <div class="form-group">
            <label>Фото</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>Назва</label>
            <input type="text" id="pName" placeholder="Що ви продаєте?">
        </div>
        <div class="form-group">
            <label>Ціна (грн)</label>
            <input type="number" id="pPrice" placeholder="0">
        </div>
        <div class="form-group">
            <label>Категорія</label>
            <select id="pCat">
                <option>Електроніка</option>
                <option>Авто</option>
                <option>Мода</option>
                <option>Інше</option>
            </select>
        </div>
        <div class="form-group">
            <label>Опис</label>
            <textarea id="pDesc" rows="3" placeholder="Розкажіть про товар..."></textarea>
        </div>
        <button class="btn-send" onclick="addNewProduct()">Опублікувати</button>
    </div>

    <div id="profile-page" class="page">
        <div class="profile-header">
            <div class="avatar-wrap">
                <img id="avatarPreview" src="https://via.placeholder.com/100" onclick="document.getElementById('avatarFile').click()">
                <input type="file" id="avatarFile" hidden accept="image/*" onchange="updateAvatar(this)">
            </div>
            <h3 style="margin:0" id="uName">Roman</h3>
            <span style="color:#888; font-size: 14px;">@landeshuu</span><br>
            <button class="btn-edit-profile"><i class="fa fa-pencil"></i> Редагувати профіль</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span class="stat-val" id="countMy">0</span><span class="stat-label">Товари</span></div>
            <div class="stat-box"><span class="stat-val">0</span><span class="stat-label">Продано</span></div>
            <div class="stat-box"><span class="stat-val">⭐ 5.0</span><span class="stat-label">Рейтинг</span></div>
        </div>

        <h3 style="padding-left: 20px; margin-bottom: 10px;">Мої товари</h3>
        <div id="myGrid" class="products-grid"></div>
        <div id="myEmpty" class="empty-box">
            <i class="fa-regular fa-face-frown"></i>
            <span>ТОВАРІВ ЩЕ НЕМАЄ</span>
        </div>

        <div class="settings-list">
            <div class="settings-item"><i class="fa fa-cog"></i><span>Налаштування</span><i class="fa fa-chevron-right"></i></div>
            <div class="settings-item"><i class="fa fa-credit-card"></i><span>Платежі</span><i class="fa fa-chevron-right"></i></div>
            <div class="settings-item"><i class="fa fa-box"></i><span>Мої замовлення</span><i class="fa fa-chevron-right"></i></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="switchTab('home-page', this)"><i class="fa fa-home"></i>Головна</div>
        <div class="main-plus-btn" onclick="switchTab('add-page', this)"><i class="fa fa-plus"></i></div>
        <div class="nav-link" onclick="switchTab('profile-page', this)"><i class="fa fa-user"></i>Профіль</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ГОЛОВНЕ: ЗАВАНТАЖЕННЯ ДАНИХ
        let products = JSON.parse(localStorage.getItem('db_olx_v2')) || [];
        let currentFilter = 'Всі';

        function saveData() {
            localStorage.setItem('db_olx_v2', JSON.stringify(products));
        }

        function switchTab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el.classList.contains('nav-link')) el.classList.add('active');
            render();
        }

        function addNewProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const cat = document.getElementById('pCat').value;
            const file = document.getElementById('fileInput').files[0];

            if(!name || !price || !desc) { tg.showAlert("Заповніть всі поля!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                const newP = {
                    id: Date.now(),
                    name: name,
                    price: price + " грн",
                    desc: desc,
                    cat: cat,
                    img: e.target.result,
                    user: tg.initDataUnsafe?.user?.id || 'guest'
                };
                products.unshift(newP);
                saveData();
                tg.showAlert("Опубліковано!");
                switchTab('home-page', document.querySelectorAll('.nav-link')[0]);
            }
            if(file) reader.readAsDataURL(file); 
            else reader.onload({target: {result: 'https://via.placeholder.com/300'}});
        }

        function render() {
            const mainGrid = document.getElementById('mainGrid');
            const myGrid = document.getElementById('myGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const myId = tg.initDataUnsafe?.user?.id || 'guest';

            // Головна сторінка
            let filtered = products;
            if(currentFilter !== 'Всі') filtered = filtered.filter(p => p.cat === currentFilter);
            if(search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));

            if(filtered.length === 0) {
                mainGrid.innerHTML = '';
                document.getElementById('mainEmpty').style.display = 'block';
            } else {
                document.getElementById('mainEmpty').style.display = 'none';
                mainGrid.innerHTML = filtered.map(p => createCard(p)).join('');
            }

            // Сторінка профілю (Мої товари)
            let myItems = products.filter(p => p.user === myId);
            document.getElementById('countMy').innerText = myItems.length;
            if(myItems.length === 0) {
                myGrid.innerHTML = '';
                document.getElementById('myEmpty').style.display = 'block';
            } else {
                document.getElementById('myEmpty').style.display = 'none';
                myGrid.innerHTML = myItems.map(p => createCard(p)).join('');
            }
        }

        function createCard(p) {
            return `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="p-info">
                        <span class="p-name">${p.name}</span>
                        <span class="p-price">${p.price}</span>
                        <div class="p-desc">${p.desc}</div>
                    </div>
                </div>
            `;
        }

        function setFilter(cat, el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentFilter = cat;
            render();
        }

        document.getElementById('searchInput').oninput = function() {
            const val = this.value.toLowerCase();
            const hints = document.getElementById('searchHints');
            if(val.length > 0) {
                const matches = products.filter(p => p.name.toLowerCase().includes(val)).slice(0, 5);
                hints.innerHTML = matches.map(m => `<div class="hint-item" onclick="applyHint('${m.name}')">${m.name}</div>`).join('');
                hints.style.display = matches.length ? 'block' : 'none';
            } else { hints.style.display = 'none'; }
            render();
        };

        function applyHint(val) {
            document.getElementById('searchInput').value = val;
            document.getElementById('searchHints').style.display = 'none';
            render();
        }

        function updateAvatar(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('avatarPreview').src = e.target.result;
                    localStorage.setItem('my_ava', e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = () => {
            const savedAva = localStorage.getItem('my_ava');
            if(savedAva) document.getElementById('avatarPreview').src = savedAva;
            if(tg.initDataUnsafe?.user) {
                document.getElementById('uName').innerText = tg.initDataUnsafe.user.first_name;
            }
            render();
        }
    </script>
</body>
</html>
