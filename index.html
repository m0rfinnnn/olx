<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Малювалка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Дизайн підлаштовується під тему Telegram */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000); 
        }
        canvas { 
            display: block; 
            touch-action: none; /* Забороняє скролінг сторінки під час малювання */
        } 
        .controls { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 10px; 
        }
        button { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 8px; 
            background-color: var(--tg-theme-button-color, #3390ec); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            font-size: 16px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <canvas id="drawingCanvas"></canvas>
    
    <div class="controls">
        <button id="clearBtn">Очистити</button>
        <button id="closeBtn">Закрити</button>
    </div>

    <script>
        // Ініціалізація Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгортаємо на весь екран

        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        
        // Робимо полотно на весь екран
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let isDrawing = false;

        // Початок малювання
        const startPosition = (e) => {
            isDrawing = true;
            draw(e);
        };

        // Кінець малювання
        const stopPosition = () => {
            isDrawing = false;
            ctx.beginPath(); // Починаємо новий шлях, щоб лінії не з'єднувались
        };

        // Функція малювання (підтримує і мишку, і сенсор)
        const draw = (e) => {
            if (!isDrawing) return;
            
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            // Колір пензля беремо з кольору тексту теми Telegram
            ctx.strokeStyle = tg.themeParams.text_color || '#000000'; 

            let clientX = e.clientX || e.touches[0].clientX;
            let clientY = e.clientY || e.touches[0].clientY;

            ctx.lineTo(clientX, clientY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX, clientY);
        };

        // Обробники подій для мишки (ПК)
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', stopPosition);
        canvas.addEventListener('mousemove', draw);

        // Обробники подій для сенсора (Смартфони)
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', stopPosition);
        canvas.addEventListener('touchmove', draw);

        // Кнопка очищення
        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Кнопка закриття додатка
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close();
        });
    </script>
</body>
</html>
