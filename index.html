<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #f0f0f0; font-family: sans-serif; }
        canvas { display: block; background: #ffffff; }
        #status { position: absolute; top: 10px; left: 10px; pointer-events: none; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div id="status">Підключення...</div>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);

        let drawing = false;
        let last = {x: 0, y: 0};

        ws.onopen = () => status.innerText = "Онлайн (спільна дошка)";
        ws.onclose = () => status.innerText = "Офлайн (перезавантажте)";

        function draw(x0, y0, x1, y1, color, emit) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
            if(emit && ws.readyState === 1) {
                ws.send(JSON.stringify({x0, y0, x1, y1}));
            }
        }

        const getPos = (e) => {
            const t = e.touches ? e.touches[0] : e;
            return {x: t.clientX, y: t.clientY};
        };

        canvas.onmousedown = canvas.ontouchstart = (e) => {
            drawing = true;
            last = getPos(e);
        };

        window.onmouseup = window.ontouchend = () => drawing = false;

        canvas.onmousemove = canvas.ontouchmove = (e) => {
            if(!drawing) return;
            const curr = getPos(e);
            draw(last.x, last.y, curr.x, curr.y, '#000000', true);
            last = curr;
        };

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            draw(d.x0, d.y0, d.x1, d.y1, '#ff4444', false); // Чужі лінії - червоні
        };
    </script>
</body>
</html>
